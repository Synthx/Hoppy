name: hoppy
description: Follow your beer consummation and obtain statistics about drunken beers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  get_it: ^6.0.0
  equatable: ^2.0.0
  hive: ^2.0.0
  hive_flutter: ^1.0.0
  bloc: ^7.0.0-nullsafety.3
  flutter_bloc: ^7.0.0-nullsafety.3
  package_info: ^2.0.0
  reactive_forms: ^9.1.0
  camera: ^0.8.0
  path: ^1.8.0
  path_provider: ^2.0.1
  image_picker: ^0.7.2
  json_annotation: ^4.0.0
  freezed_annotation: ^0.14.0
  flutter_rating_bar: ^4.0.0
  url_launcher: ^6.0.2
  intl: ^0.17.0
  charts_flutter: ^0.10.0
  uuid: 3.0.1
  logging: 1.0.0
  device_info: 2.0.0
  share: 2.0.1
  permission_handler: 6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^8.0.0-nullsafety.2
  mockito: 5.0.0
  hive_generator: ^1.0.0
  json_serializable: ^4.0.2
  freezed: ^0.14.0+1
  build_runner: ^1.11.5
  pedantic: ^1.11.0

flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: SFPro
      fonts:
        - asset: assets/fonts/SF-Pro.ttf
        - asset: assets/fonts/SF-Pro-Italic.ttf
          style: italic
  assets:
    - assets/
    - assets/images/
    - assets/images/beer-colors/
    - assets/fonts/
