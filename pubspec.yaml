name: hoppy
description: Hoppy help you to keep tracking your beer
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  get_it: ^6.0.0
  equatable: ^2.0.0
  hive: ^2.0.0
  hive_flutter: ^1.0.0
  bloc: ^7.0.0-nullsafety.3
  flutter_bloc: ^7.0.0-nullsafety.3
  package_info: ^2.0.0
  reactive_forms: ^9.1.0
  camera: ^0.8.0
  path: ^1.7.0
  path_provider: ^2.0.1
  image_picker: ^0.7.2
  json_annotation: ^4.0.0
  freezed_annotation: ^0.14.0
  flutter_rating_bar: ^4.0.0
  google_fonts: ^2.0.0
  url_launcher: ^6.0.2
  intl: ^0.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^8.0.0-nullsafety.2
  mockito: 5.0.0
  hive_generator: ^1.0.0
  json_serializable: ^4.0.2
  freezed: ^0.14.0+1
  build_runner: ^1.11.5

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
